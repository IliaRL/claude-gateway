model_list:
  # ── claude-kiro-oauth ─────────────────────────────────────────────────────
  # All Kiro models use openai/* prefix to AIClient2API's OpenAI endpoint.
  # Using anthropic/ prefix would cause LiteLLM to append /v1/messages —
  # a path that does not exist in AIClient2API. openai/* avoids this entirely.
  - model_name: "claude-kiro-oauth:claude-opus-4-7"
    litellm_params:
      model: "openai/claude-kiro-oauth:claude-opus-4-7"
      api_base: "http://127.0.0.1:3000/v1"
      api_key: "os.environ/AICLIENT_TOKEN"

