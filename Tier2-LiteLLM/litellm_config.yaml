router_settings:
  routing_strategy: "usage-based-routing-v2"
  num_retries: 3
  retry_after: 1
  timeout: 120
  allowed_fails: 2
  retry_policy:
    AuthenticationErrorRetries: 0     # 401s surface immediately — never retry auth failures
    RateLimitErrorRetries: 3
    TimeoutErrorRetries: 2
    ServiceUnavailableErrorRetries: 3
  fallbacks:
    # Level-3 descending chains — never upgrade tier
    # Each key must exactly match a model_name entry above
    - "claude-opus": ["claude-sonnet", "claude-haiku"]
    - "claude-sonnet": ["claude-haiku"]
    # Versioned bare names — Claude Code sends these directly (e.g. /model claude-sonnet-4-6)
    # Without these entries LiteLLM logs "No fallback model group found" and surfaces raw errors
    - "claude-opus-4-7": ["claude-sonnet-4-6", "claude-haiku-4-5"]
    - "claude-opus-4-6": ["claude-sonnet-4-6", "claude-haiku-4-5"]
    - "claude-opus-4-5": ["claude-sonnet-4-6", "claude-haiku-4-5"]
    - "claude-sonnet-4-6": ["claude-haiku-4-5"]
    - "claude-sonnet-4-6-thinking": ["claude-sonnet-4-6", "claude-haiku-4-5"]
    - "claude-sonnet-4-5": ["claude-haiku-4-5"]
    - "claude-sonnet-4-5-20250929": ["claude-haiku-4-5"]
    - "claude-sonnet-4-0": ["claude-haiku-4-5"]
    - "gemini-pro": ["gemini-flash"]
    - "gemini-2.5-pro": ["gemini-pro", "gemini-flash"]
    - "gpt-5": ["openai-codex-oauth:gpt-5.4", "openai-codex-oauth:gpt-5.2"]
    # ── github-models — small-context Azure endpoint frequently 413s on Claude Code's
    # full tool schema. Fall back to NVIDIA NIM (larger context) then claude-haiku.
    - "github-models:gpt-4o-mini": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:gpt-4o": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:gpt-4.1": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:gpt-4.1-mini": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:gpt-4.1-nano": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:DeepSeek-R1": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:DeepSeek-V3-0324": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:Meta-Llama-3.1-405B-Instruct": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:Meta-Llama-3.1-8B-Instruct": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "github-models:Phi-4": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    # ── openai-custom — OpenRouter free-tier; subject to 402/credit limits.
    # Fall back to equivalent NVIDIA NIM model (no auth cost) then claude-haiku.
    - "openai-custom:openai/gpt-oss-20b:free": ["nvidia-nim:openai/gpt-oss-120b", "claude-haiku"]
    - "openai-custom:deepseek/deepseek-v4-flash:free": ["nvidia-nim:meta/llama-3.3-70b-instruct", "claude-haiku"]
    - "openai-custom:nvidia/nemotron-3-super-120b-a12b:free": ["nvidia-nim:nvidia/llama-3.3-nemotron-super-49b-v1.5", "claude-haiku"]
    - "openai-custom:nvidia/nemotron-3-nano-30b-a3b:free": ["nvidia-nim:nvidia/llama-3.3-nemotron-super-49b-v1.5", "claude-haiku"]

litellm_settings:
  drop_params: false
  set_verbose: false
  stream_timeout: 600
  request_timeout: 600
  response_headers:
    X-Accel-Buffering: "no"

general_settings:
  port: 4000
  # CLAUDE_CODE_ENABLE_GATEWAY_MODEL_DISCOVERY is set as a shell env var
  # in _ensure_gateways (~/dotfiles/zsh/zshrc) before LiteLLM starts — not here
